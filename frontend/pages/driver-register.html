<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Registration</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

}

.container{

    width:500px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.4);

}

h1{

    text-align:center;
    margin-bottom:25px;

}

input{

    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;

}

button{

    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f97316;
    color:white;
    font-size:18px;
    cursor:pointer;

}

button:hover{

    background:#ea580c;

}

#message{

    margin-top:20px;
    text-align:center;
    font-weight:bold;

}

#qrcode{

    margin-top:25px;
    display:flex;
    justify-content:center;

}

#qrLink{

    margin-top:15px;
    text-align:center;
    word-break:break-word;
    font-size:14px;

}

.success{

    color:#22c55e;

}

.error{

    color:#ef4444;

}

</style>

</head>

<body>

<div class="container">

    <h1>👨‍✈️ Driver Registration</h1>

    <input
    type="text"
    id="driverName"
    placeholder="Driver Name">

    <input
    type="text"
    id="driverId"
    placeholder="Driver ID">

    <input
    type="text"
    id="busNumber"
    placeholder="Bus Number">

    <input
    type="text"
    id="routeName"
    placeholder="Route Name">

    <input
    type="text"
    id="phone"
    placeholder="Phone Number">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button onclick="registerDriver()">
        Register Driver
    </button>

    <div id="message"></div>

    <div id="qrcode"></div>

    <div id="qrLink"></div>

</div>

<script>

async function registerDriver(){

    const driver_name =
    document.getElementById("driverName").value.trim();

    const driver_id =
    document.getElementById("driverId").value.trim();

    const bus_number =
    document.getElementById("busNumber").value.trim();

    const route_name =
    document.getElementById("routeName").value.trim();

    const phone =
    document.getElementById("phone").value.trim();

    const password =
    document.getElementById("password").value.trim();

    if(
        !driver_name ||
        !driver_id ||
        !bus_number ||
        !route_name ||
        !phone ||
        !password
    ){
        alert("Please fill all fields");
        return;
    }

    try{

        const response = await fetch(
        "http://localhost:8000/api/register-driver",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                driver_name,
                driver_id,
                bus_number,
                route_name,
                phone,
                password
            })
        });

        const data = await response.json();

        if(!response.ok){

            document.getElementById("message").innerHTML =
            `<span class="error">${data.message}</span>`;

            return;

        }

        document.getElementById("message").innerHTML =
        `<span class="success">${data.message}</span>`;

        document.getElementById("qrcode").innerHTML = "";

        new QRCode(
            document.getElementById("qrcode"),
            {
                text:data.qr_url,
                width:220,
                height:220
            }
        );

        document.getElementById("qrLink").innerHTML =
        `
        <br>
        <b>Parent QR URL</b>
        <br><br>
        ${data.qr_url}
        `;

    }
    catch(error){

        console.log(error);

        document.getElementById("message").innerHTML =
        `<span class="error">Server Connection Failed</span>`;

    }

}

</script>

</body>

</html>
