<!DOCTYPE html>
<html>

<head>

  <title>TrackMyBus AI</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
      min-height:100vh;
      color:white;
      padding:30px;
    }

    h1{
      text-align:center;
      font-size:55px;
      margin-bottom:15px;
    }

    .subtitle{
      text-align:center;
      font-size:22px;
      margin-bottom:50px;
      color:#dbeafe;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .icon{
      font-size:60px;
      margin-bottom:20px;
    }

    h2{
      margin-bottom:15px;
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:12px;
      background:#f97316;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#ea580c;
      transform:scale(1.1);
    }

  </style>

</head>

<body>

<h1>🚍 TrackMyBus AI</h1>

<div class="subtitle">
  Smart AI Powered Bus Tracking System
</div>

<div class="container">

  <div class="card">
    <div class="icon">⏳</div>
    <h2>AI ETA Prediction</h2>
    <button onclick="openPage('eta.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">👨‍👩‍👧</div>
    <h2>Parent Dashboard</h2>
    <button onclick="openPage('tracking.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">📱</div>
    <h2>QR Attendance</h2>
    <button onclick="openPage('qr.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">😮</div>
    <h2>Face Recognition</h2>
    <button onclick="openPage('face.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">💺</div>
    <h2>Seat Availability</h2>
    <button onclick="openPage('seats.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">🚨</div>
    <h2>Emergency SOS</h2>
    <button onclick="openPage('sos.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">📊</div>
    <h2>Analytics Dashboard</h2>
    <button onclick="openPage('analytics.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">💬</div>
    <h2>AI Chatbot</h2>
    <button onclick="openPage('chatbot.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">👨‍✈️</div>
    <h2>Driver Dashboard</h2>
    <button onclick="openPage('driver.html')">Open</button>
  </div>

  <div class="card">
    <div class="icon">📝</div>
    <h2>Driver Registration</h2>
    <button onclick="openPage('driver-register.html')">Open</button>
  </div>

</div>

<script>

function openPage(page){
  window.location.href = "pages/" + page;
}

</script>

</body>

</html>
